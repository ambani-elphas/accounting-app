<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Accounting Dashboard</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
<main class="container">
  <h1>Accounting Dashboard</h1>

  <section class="cards" id="cards">
    <article><h3>Transactions</h3><p id="count">0</p></article>
    <article><h3>Income</h3><p id="income">$0.00</p></article>
    <article><h3>Expenses</h3><p id="expenses">$0.00</p></article>
    <article><h3>Balance</h3><p id="balance">$0.00</p></article>
  </section>

  <section class="panel">
    <h2>Add Transaction</h2>
    <form id="transaction-form">
      <input name="description" placeholder="Description" required />
      <input name="category" placeholder="Category" required />
      <input name="amount" type="number" step="0.01" min="0.01" placeholder="Amount" required />
      <select name="type" required>
        <option value="INCOME">INCOME</option>
        <option value="EXPENSE">EXPENSE</option>
      </select>
      <button type="submit">Save</button>
    </form>
    <p id="form-message"></p>
  </section>

  <section class="panel">
    <h2>Recent Transactions <span class="muted">(latest 5)</span></h2>
    <table>
      <thead><tr><th>Description</th><th>Category</th><th>Type</th><th>Amount</th></tr></thead>
      <tbody id="transactions-body"></tbody>
    </table>
  </section>
</main>
<script src="app.js"></script>
</body>
</html>
